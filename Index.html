* { box-sizing: border-box; }
html, body { margin: 0; background: var(--ink); }
body { font-family: 'Inter', Arial, sans-serif; color: var(--parchment); }

.top-bar { display: flex; justify-content: flex-end; margin-bottom: 8px; }
.lang-switcher {
  background: var(--ink-2);
  border: 1px solid #322D24;
  color: var(--stone);
  padding: 8px 12px;
  font-family: 'Inter', Arial, sans-serif;
  font-size: 13px;
  border-radius: 2px;
  cursor: pointer;
}
.lang-switcher:focus { outline: none; border-color: var(--gold); color: var(--parchment); }

.sprocket { display: flex; justify-content: space-between; padding: 0 4px 28px; }
.sprocket-hole { width: 7px; height: 11px; background: var(--ink-2); border: 1px solid #2A261E; border-radius: 2px; }

.eyebrow {
  font-family: 'Inter', Arial, sans-serif;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  font-size: 12px;
  color: var(--gold);
  margin: 0 0 18px;
}

h1 {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-weight: 600;
  font-size: 64px;
  line-height: 1.05;
  margin: 0 0 24px;
  color: var(--parchment);
}

.hero { text-align: left; border-bottom: 1px solid #2A261E; padding-bottom: 48px; margin-bottom: 48px; }
.hero-sub { font-size: 17px; line-height: 1.65; color: var(--stone); max-width: 520px; margin: 0 0 32px; }

.cta {
  background: var(--wine);
  color: var(--parchment);
  border: 1px solid var(--wine-light);
  padding: 14px 28px;
  font-family: 'Inter', Arial, sans-serif;
  font-size: 15px;
  font-weight: 500;
  letter-spacing: 0.02em;
  cursor: pointer;
  transition: background 0.15s ease, transform 0.1s ease;
}
.cta:hover { background: var(--wine-light); }
.cta:active { transform: translateY(1px); }
.cta:focus-visible { outline: 2px solid var(--gold); outline-offset: 3px; }
.cta:disabled { opacity: 0.6; cursor: default; }

.dossier { display: flex; flex-direction: column; gap: 36px; }
.dossier-row { display: flex; gap: 20px; }
.dossier-index {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 28px;
  color: var(--gold);
  width: 36px;
  flex-shrink: 0;
}
.dossier-row h3 {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 22px;
  font-weight: 600;
  margin: 0 0 8px;
}
.dossier-row p { font-size: 15px; line-height: 1.6; color: var(--stone); margin: 0; max-width: 520px; }

.landing-footer { margin-top: 64px; border-top: 1px solid #2A261E; padding-top: 20px; }
.landing-footer p { font-size: 12px; color: #5E594D; margin: 0; }

.back-link {
  background: none; border: none; color: var(--stone); font-family: 'Inter', Arial, sans-serif;
  font-size: 14px; cursor: pointer; padding: 0; margin-bottom: 32px;
}
.back-link:hover { color: var(--parchment); }

.form-title { font-size: 44px; margin-bottom: 8px; }
.form-sub { color: var(--stone); font-size: 14px; margin: 0 0 36px; letter-spacing: 0.02em; }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
@media (max-width: 600px) {
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  h1 { font-size: 44px; }
}

.field { display: flex; flex-direction: column; margin-bottom: 20px; }
.field-full { grid-column: 1 / -1; }
.field-label { font-size: 12.5px; color: var(--stone); margin-bottom: 7px; letter-spacing: 0.02em; display: block; }

input, select {
  width: 100%;
  background: var(--ink-2);
  border: 1px solid #322D24;
  color: var(--parchment);
  padding: 12px 14px;
  font-family: 'Inter', Arial, sans-serif;
  font-size: 15px;
  border-radius: 2px;
}
input:focus, select:focus { outline: none; border-color: var(--gold); }
select { appearance: none; }

.error { color: #C9685F; font-size: 12px; margin-top: 6px; display: block; }

.cta-submit { margin-top: 12px; width: 100%; padding: 16px; font-size: 16px; }

.success { text-align: left; padding-top: 96px; }
.success-body { font-size: 17px; line-height: 1.65; color: var(--stone); max-width: 480px; margin: 0 0 36px; }

var COUNTRIES = [
  "United States", "United Kingdom", "Denmark", "Canada", "Australia",
  "Germany", "France", "Sweden", "Norway", "Netherlands", "Ireland",
  "New Zealand", "Other"
];

var FORMSPREE_ENDPOINT = "https://formspree.io/f/xjgqbeyo";

// ---------------------------------------------------------------------------
// App state
// ---------------------------------------------------------------------------
var state = {
  route: "landing",
  lang: "en",
  form: {
    firstName: "", lastName: "", email: "", phone: "",
    address: "", city: "", zip: "", state: "", country: "", countryOther: "",
    fanSince: ""
  },
  errors: {},
  saving: false,
  lastSubmitted: null
};

function t(key) {
  var dict = TRANSLATIONS[state.lang] || TRANSLATIONS.en;
  var val = (key in dict) ? dict[key] : TRANSLATIONS.en[key];
  return val;
}

function escapeHtml(str) {
  return String(str == null ? "" : str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function detectLang() {
  var supported = LANGUAGES.map(function (l) { return l.code; });
  var browserLangs = (navigator.languages && navigator.languages.length) ? navigator.languages : [navigator.language || "en"];
  for (var i = 0; i < browserLangs.length; i++) {
    var code = browserLangs[i].toLowerCase().split("-")[0];
    if (supported.indexOf(code) !== -1) return code;
  }
  return "en";
}

function sprocketHtml() {
  var holes = "";
  for (var i = 0; i < 18; i++) holes += '<span class="sprocket-hole"></span>';
  return '<div class="sprocket" aria-hidden="true">' + holes + '</div>';
}

function langSwitcherHtml() {
  var opts = LANGUAGES.map(function (l) {
    return '<option value="' + l.code + '"' + (l.code === state.lang ? ' selected' : '') + '>' + l.label + '</option>';
  }).join("");
  return '<div class="top-bar"><select class="lang-switcher" id="lang-switcher" aria-label="Language">' + opts + '</select></div>';
}

// ---------------------------------------------------------------------------
// Page renderers
// ---------------------------------------------------------------------------
function renderLanding() {
  return (
    '<div class="page landing">' +
      langSwitcherHtml() +
      sprocketHtml() +
      '<header class="hero">' +
        '<p class="eyebrow">' + escapeHtml(t("eyebrow")) + '</p>' +
        '<h1>' + escapeHtml(t("heroTitle1")) + '<br>' + escapeHtml(t("heroTitle2")) + '</h1>' +
        '<p class="hero-sub">' + escapeHtml(t("heroSub")) + '</p>' +
        '<button class="cta" id="begin-btn">' + escapeHtml(t("begin")) + '</button>' +
      '</header>' +
      '<section class="dossier">' +
        '<div class="dossier-row"><span class="dossier-index">I.</span><div><h3>' + escapeHtml(t("d1Title")) + '</h3><p>' + escapeHtml(t("d1Body")) + '</p></div></div>' +
        '<div class="dossier-row"><span class="dossier-index">II.</span><div><h3>' + escapeHtml(t("d2Title")) + '</h3><p>' + escapeHtml(t("d2Body")) + '</p></div></div>' +
        '<div class="dossier-row"><span class="dossier-index">III.</span><div><h3>' + escapeHtml(t("d3Title")) + '</h3><p>' + escapeHtml(t("d3Body")) + '</p></div></div>' +
      '</section>' +
      '<footer class="landing-footer"><p>' + escapeHtml(t("footer")) + '</p></footer>' +
    '</div>'
  );
}

function fieldHtml(id, label, inputHtml, errorKey) {
  var err = state.errors[errorKey || id];
  return (
    '<label class="field" for="' + id + '">' +
      '<span class="field-label">' + escapeHtml(label) + '</span>' +
      inputHtml +
      (err ? '<span class="error">' + escapeHtml(err) + '</span>' : '') +
    '</label>'
  );
}

function renderRegister() {
  var f = state.form;
  var countryOptions = '<option value="">' + escapeHtml(t("selectCountry")) + '</option>' +
    COUNTRIES.map(function (c) {
      return '<option value="' + escapeHtml(c) + '"' + (f.country === c ? ' selected' : '') + '>' + escapeHtml(c) + '</option>';
    }).join("");

  var fanKeys = ["fan1", "fan2", "fan3", "fan4", "fan5", "fan6"];
  var fanOptions = '<option value="">' + escapeHtml(t("selectOne")) + '</option>' +
    fanKeys.map(function (k) {
      var label = t(k);
      return '<option value="' + escapeHtml(label) + '"' + (f.fanSince === label ? ' selected' : '') + '>' + escapeHtml(label) + '</option>';
    }).join("");

  var html =
    '<div class="page register">' +
      langSwitcherHtml() +
      sprocketHtml() +
      '<button class="back-link" id="back-btn">' + escapeHtml(t("back")) + '</button>' +
      '<h1 class="form-title">' + escapeHtml(t("formTitle")) + '</h1>' +
      '<p class="form-sub">' + escapeHtml(t("formSub")) + '</p>' +
      '<form id="app-form" novalidate>' +
        '<div class="grid-2">' +
          fieldHtml("firstName", t("firstName"), '<input id="firstName" value="' + escapeHtml(f.firstName) + '">') +
          fieldHtml("lastName", t("lastName"), '<input id="lastName" value="' + escapeHtml(f.lastName) + '">') +
        '</div>' +
        '<div class="grid-2">' +
          fieldHtml("email", t("email"), '<input type="email" id="email" value="' + escapeHtml(f.email) + '">') +
          fieldHtml("phone", t("phone"), '<input type="tel" id="phone" value="' + escapeHtml(f.phone) + '">') +
        '</div>' +
        fieldHtml("address", t("address"), '<input id="address" value="' + escapeHtml(f.address) + '">').replace('class="field"', 'class="field field-full"') +
        '<div class="grid-3">' +
          fieldHtml("city", t("city"), '<input id="city" value="' + escapeHtml(f.city) + '">') +
          fieldHtml("state", t("state"), '<input id="state" value="' + escapeHtml(f.state) + '">') +
          fieldHtml("zip", t("zip"), '<input id="zip" value="' + escapeHtml(f.zip) + '">') +
        '</div>' +
        fieldHtml("country", t("country"), '<select id="country">' + countryOptions + '</select>').replace('class="field"', 'class="field field-full"') +
        (f.country === "Other" ? fieldHtml("countryOther", t("countryOther"), '<input id="countryOther" value="' + escapeHtml(f.countryOther) + '">').replace('class="field"', 'class="field field-full"') : '') +
        fieldHtml("fanSince", t("fanSince"), '<select id="fanSince">' + fanOptions + '</select>').replace('class="field"', 'class="field field-full"') +
        '<button class="cta cta-submit" type="submit" id="submit-btn"' + (state.saving ? ' disabled' : '') + '>' +
          escapeHtml(state.saving ? t("submitting") : t("submit")) +
        '</button>' +
      '</form>' +
    '</div>';
  return html;
}

function renderSuccess() {
  var f = state.lastSubmitted || {};
  return (
    '<div class="page success">' +
      langSwitcherHtml() +
      sprocketHtml() +
      '<p class="eyebrow">' + escapeHtml(t("successEyebrow")) + '</p>' +
      '<h1>' + escapeHtml(t("successTitle")) + '</h1>' +
      '<p class="success-body">' + escapeHtml(t("successBody")(f.firstName || "", f.email || "")) + '</p>' +
      '<button class="cta" id="home-btn">' + escapeHtml(t("home")) + '</button>' +
    '</div>'
  );
}

// ---------------------------------------------------------------------------
// Render + event wiring
// ---------------------------------------------------------------------------
function render() {
  var root = document.getElementById("root");
  if (state.route === "landing") root.innerHTML = renderLanding();
  else if (state.route === "register") root.innerHTML = renderRegister();
  else root.innerHTML = renderSuccess();
  wireEvents();
}

function wireEvents() {
  var langEl = document.getElementById("lang-switcher");
  if (langEl) {
    langEl.addEventListener("change", function (e) {
      state.lang = e.target.value;
      render();
    });
  }

  var beginBtn = document.getElementById("begin-btn");
  if (beginBtn) {
    beginBtn.addEventListener("click", function () {
      state.route = "register";
      render();
    });
  }

  var backBtn = document.getElementById("back-btn");
  if (backBtn) {
    backBtn.addEventListener("click", function () {
      state.route = "landing";
      render();
    });
  }

  var homeBtn = document.getElementById("home-btn");
  if (homeBtn) {
    homeBtn.addEventListener("click", function () {
      state.route = "landing";
      render();
    });
  }

  var formEl = document.getElementById("app-form");
  if (formEl) {
    var ids = ["firstName", "lastName", "email", "phone", "address", "city", "state", "zip", "country", "countryOther", "fanSince"];
    ids.forEach(function (id) {
      var el = document.getElementById(id);
      if (!el) return;
      el.addEventListener("input", function () {
        state.form[id] = el.value;
      });
      el.addEventListener("change", function () {
        state.form[id] = el.value;
        if (id === "country") render(); // re-render to show/hide countryOther field
      });
    });

    formEl.addEventListener("submit", function (e) {
      e.preventDefault();
      handleSubmit();
    });
  }
}

function validate() {
  var f = state.form;
  var required = ["firstName", "lastName", "email", "phone", "address", "city", "zip", "state", "country", "fanSince"];
  var errs = {};
  required.forEach(function (k) {
    if (!f[k] || !String(f[k]).trim()) errs[k] = t("required");
  });
  if (f.email && !/^\S+@\S+\.\S+$/.test(f.email)) {
    errs.email = t("invalidEmail");
  }
  if (f.country === "Other" && (!f.countryOther || !f.countryOther.trim())) {
    errs.countryOther = t("required");
  }
  state.errors = errs;
  return Object.keys(errs).length === 0;
}

function handleSubmit() {
  if (!validate()) {
    render();
    return;
  }
  state.saving = true;
  render();

  var f = state.form;
  var resolvedCountry = f.country === "Other" ? f.countryOther : f.country;
  var payload = {};
  for (var k in f) { if (Object.prototype.hasOwnProperty.call(f, k)) payload[k] = f[k]; }
  payload.country = resolvedCountry;

  try {
    var id = "app_" + Date.now();
    localStorage.setItem(id, JSON.stringify(Object.assign({}, payload, { submittedAt: new Date().toISOString() })));
  } catch (err) {
    console.error("Could not save application locally", err);
  }

  fetch(FORMSPREE_ENDPOINT, {
    method: "POST",
    headers: { "Content-Type": "application/json", "Accept": "application/json" },
    body: JSON.stringify(payload)
  }).catch(function (err) {
    console.error("Could not send application email", err);
  }).then(function () {
    state.saving = false;
    state.lastSubmitted = payload;
    state.route = "success";
    render();
  });
}

// ---------------------------------------------------------------------------
// Boot
// ---------------------------------------------------------------------------
state.lang = detectLang();
render();
</script>
